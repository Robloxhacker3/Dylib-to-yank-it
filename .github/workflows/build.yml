name: Build Vitamin dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-dylib:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Vitamin dylib
        run: |
          cd $GITHUB_WORKSPACE
          clang -dynamiclib VitaminWindow.m -framework Foundation -framework UIKit -o Vitamin.dylib

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vitamin-dylib
          path: Vitamin.dylib
